<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntelliCash - Smart Finance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Prevent "Cannot set property fetch of #<Window> which has only a getter" error
      if (typeof window !== "undefined") {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, "fetch", {
            configurable: true,
            enumerable: true,
            get: function() { return originalFetch; },
            set: function(val) { console.warn("Ignored attempt to overwrite fetch"); }
          });
        } catch (e) {
          console.warn("Fetch polyfill interception failed", e);
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
